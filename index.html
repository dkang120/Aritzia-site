<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARITZIA | Effortless Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #1a1a1a; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .btn-luxury { transition: all 0.5s; border: 1px solid black; padding: 1rem 3rem; text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; font-weight: bold; }
        .btn-luxury:hover { background-color: #000; color: #fff; }
    </style>
</head>
<body>
    <div class="bg-[#F5F5F0] text-[10px] tracking-[0.15em] py-2.5 text-center uppercase font-semibold border-b border-zinc-200">
        Complimentary Shipping on Orders Over $150
    </div>
    <header class="flex justify-between items-center px-10 py-6 sticky top-0 bg-white/80 backdrop-blur-sm z-50">
        <div class="text-2xl tracking-[0.3em] uppercase font-light">ARITZIA</div>
        <div class="flex gap-6 text-[11px] uppercase tracking-widest font-medium">
            <a href="#">Shop</a>
            <a href="#">Bag (0)</a>
        </div>
    </header>
    <section class="relative h-[80vh] flex items-center justify-center text-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover brightness-[0.8]" alt="Fashion">
        <div class="relative z-10 space-y-6">
            <h1 class="text-white text-5xl md:text-7xl italic font-light">Effortless. Elevated.</h1>
            <p class="text-white/90 tracking-[0.3em] uppercase text-xs">The Spring Collection</p>
            <div class="pt-4">
                <button class="bg-white text-black btn-luxury">Shop New Arrivals</button>
            </div>
        </div>
    </section>
</body>
</html>
